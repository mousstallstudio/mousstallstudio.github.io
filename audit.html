<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit & Pentest | Mousstall Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.8); }

        body { 
            background-color: var(--bg-dark); color: #e0e0e0; 
            font-family: 'Fira Code', monospace; margin: 0; padding: 0;
        }

        /* Effet scanline animé (comme sur l'index) */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 10;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

        .container { max-width: 900px; margin: 40px auto; padding: 20px; position: relative; z-index: 5; }

        header { 
            text-align: center; border: 1px solid var(--neon-blue); padding: 25px; 
            background: var(--card-bg); margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        /* Le bouton vers ton LABS */
        .lab-access {
            display: block; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            text-align: center; padding: 20px; text-decoration: none;
            background: rgba(0, 242, 255, 0.05); transition: 0.3s;
            font-weight: bold; margin-bottom: 40px; letter-spacing: 2px;
        }
        .lab-access:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 25px var(--neon-blue); }

        .section-title { 
            color: #fff; border-left: 3px solid var(--neon-blue); 
            padding-left: 15px; margin-top: 50px; font-size: 1.2em;
        }

        /* Zone où le script injecte les cours */
        #academy-content { margin-top: 20px; }

        .accordion { 
            background: #111; color: var(--neon-blue); cursor: pointer; padding: 18px; 
            width: 100%; text-align: left; border: 1px solid #333; margin-top: 10px;
            font-family: 'Fira Code', monospace; transition: 0.3s;
            display: flex; justify-content: space-between;
        }
        .accordion:hover { border-color: var(--neon-blue); background: #1a1a1a; }
        .accordion::after { content: '+'; }
        .accordion.active::after { content: '-'; }

        .panel { 
            padding: 20px; display: none; background: rgba(0,0,0,0.8); 
            border: 1px solid #333; border-top: none; line-height: 1.6;
        }

        .back-btn {
            display: inline-block; margin-top: 50px; color: #555; 
            text-decoration: none; font-size: 0.8em; border-bottom: 1px solid transparent;
        }
        .back-btn:hover { color: var(--neon-blue); border-bottom: 1px solid var(--neon-blue); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="color: var(--neon-blue); margin:0; letter-spacing: 4px;">[ MODULE_AUDIT ]</h1>
        <p style="color: #666; font-size: 0.8em; margin-top: 10px;">ANALYSE DE VULNÉRABILITÉS & EXPLOITATION</p>
    </header>

    <a href="https://mousstallstudio-labs.github.io" target="_blank" class="lab-access">
        ⚡ CONNECT TO MOUSSTALLSTUDIO-LABS
    </a>

    <h2 class="section-title">📂 ACADÉMIE : COURS & RÉSEAUX</h2>
    
    <div id="academy-content">
        <p style="color: #444; font-size: 0.9em;">Aucun module chargé. Utilisez ajout_cours.sh pour peupler cette section.</p>
    </div>

    <a href="index.html" class="back-btn"><< RETURN_TO_BASE</a>
</div>

<script>
    // Gestion des accordéons (Identique à la page Dev pour la cohérence)
    document.addEventListener('click', function (e) {
        if (e.target.classList.contains('accordion')) {
            e.target.classList.toggle('active');
            var panel = e.target.nextElementSibling;
            if (panel.style.display === "block") {
                panel.style.display = "none";
            } else {
                panel.style.display = "block";
            }
        }
    });
</script>

</body>
</html>
