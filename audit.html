<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audit Academy | Mousstall</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: monospace; padding: 30px; }
        .content { max-width: 900px; margin: auto; border: 1px solid #00f2ff; padding: 25px; background: rgba(0,0,0,0.8); }
        .lab-btn { display: block; background: #00f2ff; color: #000; text-align: center; padding: 15px; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .lab-btn:hover { background: #fff; box-shadow: 0 0 20px #00f2ff; }
        .accordion { background: #111; color: #00f2ff; cursor: pointer; padding: 15px; width: 100%; text-align: left; border: 1px solid #00f2ff; margin-top: 10px; font-family: monospace; }
        .panel { padding: 0 15px; display: none; background: #000; border: 1px solid #00f2ff; border-top: none; }
        .back { color: #555; text-decoration: none; display: block; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="content">
        <h1>[ MODULE_AUDIT ]</h1>
        
        <a href="https://tryhackme.com" target="_blank" class="lab-btn">⚡ ACCÉDER AU LABO DE PENTEST (VPN REQUIS)</a>

        <p>Bienvenue dans l'académie. Ici sont regroupés tes outils et tes notes d'audit.</p>
        <hr style="border: 0.5px solid #222;">

        <h2 style="color: #fff;">📂 COURS & MÉTHODOLOGIES</h2>
        <div id="academy-content"></div>

        <a href="index.html" class="back"><< RETOUR_STUDIO</a>
    </div>

    <script>
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('accordion')) {
                e.target.classList.toggle('active');
                var panel = e.target.nextElementSibling;
                panel.style.display = (panel.style.display === "block") ? "none" : "block";
            }
        });
    </script>
</body>
</html>
