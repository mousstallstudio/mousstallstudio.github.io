<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit & Pentest | Mousstall Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.8); }

        body { 
            background-color: var(--bg-dark); color: #e0e0e0; 
            font-family: 'Fira Code', monospace; margin: 0; padding: 0;
        }

        /* Effet scanline */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 10;
        }

        .container { max-width: 900px; margin: 40px auto; padding: 20px; position: relative; z-index: 5; }

        header { 
            text-align: center; border: 1px solid var(--neon-blue); padding: 20px; 
            background: var(--card-bg); margin-bottom: 30px;
        }

        .lab-access {
            display: block; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            text-align: center; padding: 20px; text-decoration: none;
            background: rgba(0, 242, 255, 0.05); transition: 0.3s;
            font-weight: bold; margin-bottom: 30px;
        }
        .lab-access:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        .section-title { color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 40px; }

        /* Style des cours (Accordéons) */
        .accordion { 
            background: #111; color: var(--neon-blue); cursor: pointer; padding: 18px; 
            width: 100%; text-align: left; border: 1px solid #333; margin-top: 10px;
            font-family: 'Fira Code', monospace; transition: 0.3s;
        }
        .accordion:hover { border-color: var(--neon-blue); background: #1a1a1a; }

        .panel { 
            padding: 20px; display: none; background: rgba(0,0,0,0.5); 
            border: 1px solid #333; border-top: none; 
        }

        .back-btn {
            display: inline-block; margin-top: 40px; color: #555; 
            text-decoration: none; font-size: 0.9em;
        }
        .back-btn:hover { color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="color: var(--neon-blue); margin:0;">[ MODULE_AUDIT ]</h1>
        <p style="color: #666;">SÉCURITÉ OFFENSIVE & ANALYSE</p>
    </header>

    <a href="https://mousstallstudio-labs.github.io" class="lab-access">
        ⚡ ACCÉDER AU MOUSSTALLSTUDIO-LABS
    </a>

    <h2 class="section-title">📂 ACADÉMIE : PARCOURS APPRENTISSAGE</h2>
    
    <div id="academy-content">
        </div>

    <a href="index.html" class="back-btn"><< RETOUR_AU_STUDIO</a>
</div>

<script>
    // Gestion des accordéons
    document.addEventListener('click', function (e) {
        if (e.target.classList.contains('accordion')) {
            e.target.classList.toggle('active');
            var panel = e.target.nextElementSibling;
            if (panel.style.display === "block") {
                panel.style.display = "none";
                e.target.style.backgroundColor = "#111";
            } else {
                panel.style.display = "block";
                e.target.style.backgroundColor = "#1a1a1a";
            }
        }
    });
</script>

</body>
</html>
