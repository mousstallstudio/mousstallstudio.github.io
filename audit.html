<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audit & Pentest | Académie</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: monospace; padding: 50px; }
        .content { max-width: 800px; margin: auto; border: 1px solid #00f2ff; padding: 20px; }
        .accordion { background: #111; color: #00f2ff; cursor: pointer; padding: 15px; width: 100%; text-align: left; border: 1px solid #00f2ff; margin-top: 10px; }
        .panel { padding: 0 15px; display: none; background: #000; border: 1px solid #00f2ff; border-top: none; }
        .back { color: #555; text-decoration: none; display: block; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="content">
        <h1>[ MODULE_AUDIT ]</h1>
        <p>Analyse de vulnérabilités et rapports de sécurité.</p>
        
        <hr style="border: 0.5px solid #222; margin: 30px 0;">
        
        <h2 style="color: #fff;">📂 APPRENTISSAGE : COURS</h2>
        
        <div id="academy-content"></div>

        <a href="index.html" class="back">RETOUR_STUDIO</a>
    </div>

    <script>
        // Gestionnaire des accordéons
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('accordion')) {
                e.target.classList.toggle('active');
                var panel = e.target.nextElementSibling;
                panel.style.display = (panel.style.display === "block") ? "none" : "block";
            }
        });
    </script>
</body>
</html>
