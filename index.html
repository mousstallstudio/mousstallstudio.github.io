<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="4EXDqh7YzeG--Z6N-zWOSA2uwGVDQ6bfdD3NE2kfbpo" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mousstall Studio : Expertise en cybersécurité, pentesting et développement d'applications Flutter à Dakar, Sénégal.">
    <title>Mousstall Studio | Offensive Security & Dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-green: #39ff14; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.8); }
        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Fira Code', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 60px auto; padding: 20px; position: relative; z-index: 5; }
        header { text-align: center; border: 1px solid var(--neon-blue); padding: 30px; border-radius: 4px; background: var(--card-bg); margin-bottom: 40px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        h1 { font-size: 2.2em; letter-spacing: 5px; text-transform: uppercase; margin: 0; color: var(--neon-blue); }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        @media (max-width: 1000px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); border: 1px solid #333; padding: 20px; border-radius: 4px; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .btn-details { display: inline-block; margin-top: 15px; padding: 8px 15px; border: 1px solid currentColor; color: inherit; text-decoration: none; font-size: 0.8em; border-radius: 4px; text-align: center; }
        .footer-info { margin-top: 80px; padding: 30px; border-top: 1px dashed #333; background: rgba(10, 10, 10, 0.5); display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .footer-info { grid-template-columns: 1fr; } }
        .social-bar { text-align: center; margin-top: 60px; padding: 20px; border: 1px solid #222; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MOUSSTALL STUDIO</h1>
        <p style="color: #888;">OFFENSIVE SECURITY & DIGITAL CREATION</p>
    </header>

    <div id="projets-container" class="grid-container"></div>

    <div class="footer-info">
        <div>
            <h4 style="color: var(--neon-blue);">[ MISSION_STATEMENT ]</h4>
            <p style="font-size: 0.9em; color: #bbb;">Mousstall Studio est un laboratoire d'innovation à Dakar, fusionnant sécurité offensive et création digitale.</p>
        </div>
        <div>
            <h4 style="color: #888;">[ SÉCURITÉ ]</h4>
            <p style="font-size: 0.8em; color: #777;">Éthique White Hat stricte. © 2026 Mousstall Studio.</p>
        </div>
    </div>

    <div class="social-bar">
        <h4 style="color: #666; font-size: 0.7em;">[ CONNECT_TO_NETWORK ]</h4>
        <div style="display: flex; justify-content: center; gap: 30px;">
            <a href="https://github.com/mousstallstudio" target="_blank" style="color: var(--neon-green); text-decoration: none;">#GITHUB</a>
            <a href="mailto:mousstallstudio@gmail.com" style="color: #ff003c; text-decoration: none;">#EMAIL</a>
        </div>
    </div>
</div>

<script>
    fetch('projets.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('projets-container');
            data.forEach(p => {
                container.innerHTML += `
                    <div class="card" style="border-color: ${p.couleur}; color: ${p.couleur};">
                        <div><h3>${p.titre}</h3><p style="color: #ccc;">${p.description}</p></div>
                        <a href="${p.lien}" class="btn-details">EN SAVOIR PLUS</a>
                    </div>`;
            });
        }).catch(err => console.error(err));
</script>
</body>
</html>
