<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="4EXDqh7YzeG--Z6N-zWOSA2uwGVDQ6bfdD3NE2kfbpo" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mousstall Studio : Expertise en cybersécurité, pentesting et développement d'applications Flutter à Dakar, Sénégal.">
    <title>Mousstall Studio | Offensive Security & Dev</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --neon-green: #39ff14; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.8); }
        
        body { 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #e0e0e0; 
            font-family: 'Fira Code', monospace; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Effet scanline */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 10;
        }

        .container { max-width: 1100px; margin: 60px auto; padding: 20px; position: relative; z-index: 5; }

        header { 
            text-align: center; border: 1px solid var(--neon-blue); padding: 30px; 
            border-radius: 4px; background: var(--card-bg); margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        h1 { font-size: 2.2em; letter-spacing: 5px; text-transform: uppercase; margin: 0; color: var(--neon-blue); }

        /* Grille Responsive */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
        }

        @media (max-width: 1000px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }

        .card { 
            background: var(--card-bg); border: 1px solid #333; padding: 20px; border-radius: 4px; 
            transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-color: inherit; }

        .btn-details {
            display: inline-block; margin-top: 15px; padding: 8px 15px;
            background: transparent; border: 1px solid currentColor;
            color: inherit; text-decoration: none; font-size: 0.8em;
            border-radius: 4px; transition: 0.3s; text-align: center;
        }

        .btn-details:hover { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 10px currentColor; }

        .footer { text-align: center; margin-top: 60px; padding: 20px; color: #555; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="typing">MOUSSTALL STUDIO</h1>
        <p style="color: #888;">OFFENSIVE SECURITY & DIGITAL CREATION</p>
    </header>

    <div id="projets-container" class="grid-container"></div>

    <footer class="footer">
        MOUSSTALL_STUDIO // DAKAR_SN // V1.0 // 2026
    </footer>
</div>

<script>
    // Chargement dynamique des projets
    fetch('projets.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('projets-container');
            data.forEach(projet => {
                container.innerHTML += `
                    <div class="card" style="border-color: ${projet.couleur}; color: ${projet.couleur};">
                        <div>
                            <h3 style="margin-top:0;">${projet.titre}</h3>
                            <p style="color: #ccc; font-size: 0.9em;">${projet.description}</p>
                        </div>
                        <a href="${projet.lien}" class="btn-details">EN SAVOIR PLUS</a>
                    </div>
                `;
            });
        })
        .catch(err => console.error("Erreur chargement JSON:", err));
</script>

</body>
</html>
